# =============================================================================
# PostgreSQL configuration for Database Security Monitoring (DSA4030 Group 9)
# =============================================================================
# This file is mounted read-only and loaded via `-c config_file=`.
# It turns on the auditing + logging that the whole monitoring stack relies on.

listen_addresses = '*'

# ---------------------------------------------------------------------------
# Logging: capture connections, disconnections and every failed login attempt
# ---------------------------------------------------------------------------
logging_collector = on
log_destination = 'stderr'
log_directory = '/var/log/postgresql'
log_filename = 'postgresql.log'          # stable name so Promtail can tail it
log_rotation_age = 0                      # single file (easier for the demo)
log_rotation_size = 0
log_truncate_on_rotation = off

# %m=timestamp  %p=pid  %u=user  %d=db  %r=remote host  %a=application
# Promtail parses this exact prefix — do not change without updating promtail.
log_line_prefix = '%m [%p] %q%u@%d(%r) '

log_connections = on          # logs every successful AND failed authentication
log_disconnections = on
log_hostname = off
log_statement = 'ddl'         # backstop for schema/role changes (pgAudit does the rest)
log_min_messages = warning
log_min_error_statement = error

# ---------------------------------------------------------------------------
# pg_stat_statements: powers the "large data export" detection (rows returned)
# ---------------------------------------------------------------------------
shared_preload_libraries = 'pgaudit,pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on

# ---------------------------------------------------------------------------
# pgAudit: the database auditing engine
#   session logging of:
#     read  -> SELECT / COPY ... TO         (large exports)
#     write -> INSERT / UPDATE / DELETE
#     role  -> GRANT / REVOKE / CREATE ROLE / ALTER ROLE  (privilege changes)
#     ddl   -> CREATE / ALTER / DROP
# ---------------------------------------------------------------------------
pgaudit.log = 'role, ddl, write, read'
pgaudit.log_catalog = off        # don't spam on internal catalog reads
pgaudit.log_client = off
pgaudit.log_level = 'log'
pgaudit.log_parameter = on       # record statement parameters (evidence!)
pgaudit.log_relation = on        # one audit line per relation touched
pgaudit.log_statement_once = off
