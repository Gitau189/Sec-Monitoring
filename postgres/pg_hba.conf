# =============================================================================
# Host-Based Authentication for the security-monitoring demo
# =============================================================================
# scram-sha-256 = passwords are never stored or sent in the clear.
# Every remote connection must authenticate with a password, so failed-login
# monitoring has something to catch.

# TYPE  DATABASE  USER      ADDRESS         METHOD
local   all       all                       scram-sha-256
host    all       all       127.0.0.1/32    scram-sha-256
host    all       all       ::1/128         scram-sha-256

# Docker bridge network (other containers: exporter, etc.) and the host.
host    all       all       0.0.0.0/0       scram-sha-256
